<!DOCTYPE html>

        <form id="login-form" class="auth-form" onsubmit="handleLogin(event)">

            <div class="form-group">
              <label class="form-label">First Name</label>
              <input class="form-input" type="text" id="signup-fname" placeholder="Alex" required />
            </div>
            <div class="form-group">
              <label class="form-label">Last Name</label>
              <input class="form-input" type="text" id="signup-lname" placeholder="Johnson" required />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input class="form-input" type="email" id="signup-email" placeholder="you@example.com" required />
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input class="form-input" type="password" id="signup-password" placeholder="Min 8 characters" required minlength="8" />
          </div>
          <div class="form-group">
            <label class="form-label">City / Location</label>
            <input class="form-input" type="text" id="signup-location" placeholder="New York, USA" />
          </div>
          <button type="submit" class="btn btn-primary btn-full" id="signup-btn">
            Create Free Account
          </button>
        </form>
        <div id="auth-error" class="auth-error hidden"></div>
      </div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="main-app" class="screen hidden">
